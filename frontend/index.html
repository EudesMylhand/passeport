<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PasseportTrack - Connexion</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="css/style.css" rel="stylesheet">
</head>
<body>
<div class="login-wrapper">
  <div class="card login-card p-4">
    <div class="text-center mb-3">
      <i class="bi bi-passport text-success" style="font-size:2.5rem;"></i>
      <h4 class="mt-2 mb-0">PasseportTrack</h4>
      <small class="text-muted">Republique du Congo &mdash; Suivi de production et livraison</small>
    </div>
    <form id="loginForm">
      <div class="mb-3">
        <label class="form-label">Adresse email</label>
        <input type="email" class="form-control" id="email" required placeholder="nom@passeporttrack.cg">
      </div>
      <div class="mb-3">
        <label class="form-label">Mot de passe</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <div id="loginError" class="alert alert-danger d-none"></div>
      <button type="submit" class="btn btn-success w-100" id="loginBtn">
        <i class="bi bi-box-arrow-in-right"></i> Se connecter
      </button>
    </form>
    <p class="text-center text-muted mt-3 mb-0" style="font-size:.8rem;">
      Comptes de demonstration disponibles apres execution du seed (npm run seed)
    </p>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const errorBox = document.getElementById('loginError');
  const btn = document.getElementById('loginBtn');
  errorBox.classList.add('d-none');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Connexion...';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('email').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Erreur de connexion');
    setSession(data.token, data.user);
    window.location.href = 'pages/dashboard.html';
  } catch (err) {
    errorBox.textContent = err.message;
    errorBox.classList.remove('d-none');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Se connecter';
  }
});

// Si deja connecte, rediriger
if (getToken()) window.location.href = 'pages/dashboard.html';
</script>
</body>
</html>
