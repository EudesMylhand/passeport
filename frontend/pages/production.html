<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Production - PasseportTrack</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="pt-sidebar" class="pt-sidebar"></div>
<div class="pt-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div><button class="btn btn-sm btn-outline-secondary me-2" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
      <h4 class="d-inline">Production</h4></div>
    <span id="pt-user-label" class="text-muted small"></span>
  </div>

  <div class="card p-3 mb-3">
    <div class="row g-2">
      <div class="col-md-3"><input class="form-control form-control-sm" id="fNom" placeholder="Nom" oninput="chargerListe()"></div>
      <div class="col-md-3">
        <select class="form-select form-select-sm" id="fStatut" onchange="chargerListe()">
          <option value="">Tous les statuts</option>
          <option value="enrole">Enrole</option>
          <option value="en_production">En production</option>
          <option value="produit">Produit</option>
        </select>
      </div>
      <div class="col-md-3"><input type="date" class="form-control form-control-sm" id="fDate" onchange="chargerListe()"></div>
      <div class="col-md-3 text-end">
        <button class="btn btn-sm btn-warning" onclick="changerMasse('en_production')">→ En production</button>
        <button class="btn btn-sm btn-success" onclick="changerMasse('produit')">→ Produit</button>
        <button class="btn btn-sm btn-danger" onclick="ouvrirQuarantaineMasse()">→ Quarantaine</button>
      </div>
    </div>
  </div>

  <div class="card p-3">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead><tr><th><input type="checkbox" onclick="toutCocher(this)"></th><th>ID</th><th>Nom</th><th>Prenoms</th><th>Statut</th><th>Action</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
    <nav><ul class="pagination pagination-sm" id="pagination"></ul></nav>
  </div>
</div>

<div class="modal fade" id="modalQuarantaine" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Motif de mise en quarantaine</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body"><textarea class="form-control" id="motifQuarantaine" rows="3" placeholder="Motif..."></textarea></div>
    <div class="modal-footer"><button class="btn btn-danger" onclick="confirmerQuarantaineMasse()">Confirmer</button></div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script>
const user = requireAuth(['super_admin', 'production']);
renderSidebar('production.html');
connectNotifications();
let page = 1;

async function chargerListe() {
  const params = new URLSearchParams({
    page, limit: 10,
    nom: document.getElementById('fNom').value,
    statut: document.getElementById('fStatut').value,
    date_enrolement: document.getElementById('fDate').value
  });
  const res = await apiFetch(`/passports?${params}`);
  document.getElementById('tableBody').innerHTML = res.data.map(p => `
    <tr>
      <td><input type="checkbox" class="ckRow" value="${p.id}"></td>
      <td>${p.id}</td><td>${p.nom}</td><td>${p.prenoms}</td><td>${badgeStatut(p.statut)}</td>
      <td><button class="btn btn-sm btn-outline-primary" onclick="voirDetail(${p.id})"><i class="bi bi-eye"></i></button></td>
    </tr>`).join('') || '<tr><td colspan="6" class="text-center text-muted">Aucun resultat.</td></tr>';

  document.getElementById('pagination').innerHTML = Array.from({ length: res.pages }, (_, i) => `
    <li class="page-item ${i + 1 === res.page ? 'active' : ''}"><a class="page-link" href="#" onclick="page=${i + 1};chargerListe();return false;">${i + 1}</a></li>`).join('');
}

function toutCocher(src) { document.querySelectorAll('.ckRow').forEach(c => c.checked = src.checked); }
function idsSelectionnes() { return Array.from(document.querySelectorAll('.ckRow:checked')).map(c => parseInt(c.value)); }

async function changerMasse(statut) {
  const ids = idsSelectionnes();
  if (!ids.length) return alert('Selectionnez au moins un passeport.');
  try {
    await apiFetch('/passports/bulk-status', { method: 'POST', body: JSON.stringify({ ids, nouveau_statut: statut }) });
    chargerListe();
  } catch (err) { alert(err.message); }
}

function ouvrirQuarantaineMasse() {
  if (!idsSelectionnes().length) return alert('Selectionnez au moins un passeport.');
  new bootstrap.Modal(document.getElementById('modalQuarantaine')).show();
}

async function confirmerQuarantaineMasse() {
  const ids = idsSelectionnes();
  const commentaire = document.getElementById('motifQuarantaine').value;
  try {
    await apiFetch('/passports/bulk-status', { method: 'POST', body: JSON.stringify({ ids, nouveau_statut: 'quarantaine', commentaire }) });
    bootstrap.Modal.getInstance(document.getElementById('modalQuarantaine')).hide();
    chargerListe();
  } catch (err) { alert(err.message); }
}

function voirDetail(id) { window.location.href = `detail.html?id=${id}`; }
chargerListe();
</script>
</body>
</html>
