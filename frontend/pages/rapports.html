<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rapports - PasseportTrack</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="pt-sidebar" class="pt-sidebar"></div>
<div class="pt-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div><button class="btn btn-sm btn-outline-secondary me-2" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
      <h4 class="d-inline">Rapports et statistiques</h4></div>
    <span id="pt-user-label" class="text-muted small"></span>
  </div>

  <div class="row g-3 mb-3">
    <div class="col-md-4"><div class="card p-3"><h6>Production journaliere</h6><div id="rapJour"></div></div></div>
    <div class="col-md-4"><div class="card p-3"><h6>Production mensuelle</h6><div id="rapMois"></div></div></div>
    <div class="col-md-4"><div class="card p-3"><h6>Plaintes</h6><div id="rapPlaintes"></div></div></div>
  </div>

  <div class="card p-3">
    <h6>Exporter</h6>
    <button class="btn btn-outline-success me-2" onclick="window.open('/api/reports/export/passeports','_blank')">
      <i class="bi bi-file-earmark-excel"></i> Tous les passeports (Excel)
    </button>
    <button class="btn btn-outline-success me-2" onclick="window.open('/api/reports/export/passeports?statut=livre','_blank')">
      <i class="bi bi-file-earmark-excel"></i> Passeports livres (Excel)
    </button>
    <button class="btn btn-outline-danger" onclick="window.open('/api/reports/export/passeports?statut=quarantaine','_blank')">
      <i class="bi bi-file-earmark-excel"></i> Passeports en quarantaine (Excel)
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script>
const user = requireAuth(['super_admin', 'reception_plaintes']);
renderSidebar('rapports.html');

async function charger() {
  try {
    const j = await apiFetch('/reports/journalier');
    document.getElementById('rapJour').innerHTML = `<div class="stat-value text-success">${j.total}</div><div class="small text-muted">enrolements le ${j.date}</div>`;
  } catch { document.getElementById('rapJour').innerHTML = '<span class="text-muted">Acces non autorise</span>'; }

  try {
    const m = await apiFetch('/reports/mensuel');
    document.getElementById('rapMois').innerHTML = `<div class="stat-value text-success">${m.total}</div><div class="small text-muted">depuis le debut de ${m.mois}</div>`;
  } catch { document.getElementById('rapMois').innerHTML = '<span class="text-muted">Acces non autorise</span>'; }

  try {
    const p = await apiFetch('/reports/plaintes');
    document.getElementById('rapPlaintes').innerHTML = `${p.total} dossier(s) — ${p.ouvertes} ouverte(s), ${p.en_cours} en cours, ${p.resolues} resolue(s)`;
  } catch { document.getElementById('rapPlaintes').innerHTML = '<span class="text-muted">Acces non autorise</span>'; }
}
charger();
</script>
</body>
</html>
