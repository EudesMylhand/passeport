<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reception et Livraison - PasseportTrack</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="pt-sidebar" class="pt-sidebar"></div>
<div class="pt-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div><button class="btn btn-sm btn-outline-secondary me-2" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
      <h4 class="d-inline">Reception et Livraison</h4></div>
    <span id="pt-user-label" class="text-muted small"></span>
  </div>

  <div class="card p-3 mb-3">
    <input class="form-control" id="fSearch" placeholder="Rechercher par ID, nom ou numero de passeport..." oninput="chargerListe()">
  </div>

  <div class="card p-3">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead><tr><th>ID</th><th>Numero</th><th>Nom</th><th>Prenoms</th><th>Statut</th><th>Action</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="modalLivraison" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">Livrer le passeport</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <input type="hidden" id="livraisonPassportId">
      <label class="form-label small">Nom du destinataire</label>
      <input class="form-control" id="destinataire" placeholder="Nom complet du beneficiaire">
    </div>
    <div class="modal-footer">
      <button class="btn btn-success" onclick="confirmerLivraison()"><i class="bi bi-truck"></i> Confirmer la livraison</button>
    </div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script>
const user = requireAuth(['super_admin', 'reception_plaintes']);
renderSidebar('reception.html');
connectNotifications();

async function chargerListe() {
  const search = document.getElementById('fSearch').value;
  const params = new URLSearchParams({ statut: 'pret_a_livrer', limit: 50, search });
  const res = await apiFetch(`/passports?${params}`);
  document.getElementById('tableBody').innerHTML = res.data.map(p => `
    <tr>
      <td>${p.id}</td><td>${p.numero_passeport || '-'}</td><td>${p.nom}</td><td>${p.prenoms}</td>
      <td>${badgeStatut(p.statut)}</td>
      <td><button class="btn btn-sm btn-success" onclick="ouvrirLivraison(${p.id})"><i class="bi bi-truck"></i> Livrer</button></td>
    </tr>`).join('') || '<tr><td colspan="6" class="text-center text-muted">Aucun passeport pret a livrer.</td></tr>';
}

function ouvrirLivraison(id) {
  document.getElementById('livraisonPassportId').value = id;
  document.getElementById('destinataire').value = '';
  new bootstrap.Modal(document.getElementById('modalLivraison')).show();
}

async function confirmerLivraison() {
  const id = document.getElementById('livraisonPassportId').value;
  const destinataire = document.getElementById('destinataire').value;
  if (!destinataire) return alert('Indiquez le nom du destinataire.');
  try {
    await apiFetch(`/passports/${id}/livrer`, { method: 'POST', body: JSON.stringify({ destinataire }) });
    bootstrap.Modal.getInstance(document.getElementById('modalLivraison')).hide();
    chargerListe();
    if (confirm('Livraison enregistree. Telecharger l\'accuse de reception PDF ?')) {
      window.open(`/api/passports/${id}/accuse-reception`, '_blank');
    }
  } catch (err) { alert(err.message); }
}
chargerListe();
</script>
</body>
</html>
