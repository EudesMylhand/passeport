<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard - PasseportTrack</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="pt-sidebar" class="pt-sidebar"></div>
<div class="pt-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <button class="btn btn-sm btn-outline-secondary me-2" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
      <h4 class="d-inline">Tableau de bord</h4>
    </div>
    <div class="d-flex align-items-center gap-3">
      <button class="btn btn-sm btn-outline-secondary" onclick="toggleTheme()"><i class="bi bi-moon-stars"></i></button>
      <span id="pt-user-label" class="text-muted small"></span>
    </div>
  </div>

  <div class="row g-3 mb-4" id="statCards"></div>

  <div class="row g-3">
    <div class="col-lg-8">
      <div class="card p-3">
        <h6>Repartition par statut</h6>
        <canvas id="chartStatuts" height="120"></canvas>
      </div>
    </div>
    <div class="col-lg-4">
      <div class="card p-3">
        <h6>Activites recentes</h6>
        <ul class="list-group list-group-flush small" id="activitesRecentes"></ul>
      </div>
    </div>
  </div>
</div>
<div id="pt-toast-container" class="toast-container position-fixed bottom-0 end-0 p-3"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3"></script>
<script src="/socket.io/socket.io.js"></script>
<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script>
const user = requireAuth();
renderSidebar('dashboard.html');
connectNotifications();

const STAT_DEFS = [
  ['enrole', 'Enrolements', 'bg-enrole', 'bi-person-plus'],
  ['en_production', 'En production', 'bg-production', 'bi-gear'],
  ['produit', 'Produits', 'bg-produit', 'bi-box-seam'],
  ['quarantaine', 'Quarantaine', 'bg-quarantaine', 'bi-exclamation-triangle'],
  ['pret_a_livrer', 'Prets a livrer', 'bg-pret', 'bi-truck'],
  ['livre', 'Livres', 'bg-livre', 'bi-check-circle'],
  ['plainte_ouverte', 'Plaintes ouvertes', 'bg-plainte', 'bi-megaphone']
];

async function loadDashboard() {
  try {
    const stats = await apiFetch('/passports/stats/dashboard');
    document.getElementById('statCards').innerHTML = STAT_DEFS.map(([key, label, cls, icon]) => `
      <div class="col-md-3 col-sm-6">
        <div class="card pt-stat-card ${cls} p-3">
          <div class="d-flex justify-content-between">
            <div>
              <div class="stat-value">${stats[key] ?? 0}</div>
              <div class="small">${label}</div>
            </div>
            <i class="bi ${icon}" style="font-size:1.8rem;opacity:.7;"></i>
          </div>
        </div>
      </div>`).join('');

    new Chart(document.getElementById('chartStatuts'), {
      type: 'bar',
      data: {
        labels: STAT_DEFS.map(s => s[1]),
        datasets: [{ label: 'Passeports', data: STAT_DEFS.map(s => stats[s[0]] ?? 0), backgroundColor: '#0b5d3b' }]
      },
      options: { plugins: { legend: { display: false } } }
    });
  } catch (err) {
    console.error(err);
  }
}

async function loadActivites() {
  try {
    const res = await apiFetch('/passports?limit=8');
    document.getElementById('activitesRecentes').innerHTML = res.data.map(p => `
      <li class="list-group-item d-flex justify-content-between align-items-center">
        ${p.nom} ${p.prenoms} ${badgeStatut(p.statut)}
      </li>`).join('') || '<li class="list-group-item text-muted">Aucune activite recente.</li>';
  } catch (err) { console.error(err); }
}

loadDashboard();
loadActivites();
</script>
</body>
</html>
