<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Utilisateurs - PasseportTrack</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link href="../css/style.css" rel="stylesheet">
</head>
<body>
<div id="pt-sidebar" class="pt-sidebar"></div>
<div class="pt-content">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div><button class="btn btn-sm btn-outline-secondary me-2" onclick="toggleSidebar()"><i class="bi bi-list"></i></button>
      <h4 class="d-inline">Gestion des utilisateurs</h4></div>
    <div class="d-flex align-items-center gap-2">
      <button class="btn btn-sm btn-primary" onclick="ouvrirAjout()"><i class="bi bi-person-plus"></i> Ajouter</button>
      <span id="pt-user-label" class="text-muted small"></span>
    </div>
  </div>

  <div class="card p-3">
    <div class="table-responsive">
      <table class="table table-hover align-middle">
        <thead><tr><th>Nom</th><th>Email</th><th>Service</th><th>Role</th><th>Statut</th><th>Action</th></tr></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal fade" id="modalUser" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title" id="modalTitle">Nouvel utilisateur</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <input type="hidden" id="uId">
      <div class="row g-2">
        <div class="col-6"><label class="form-label small">Nom</label><input class="form-control" id="uNom"></div>
        <div class="col-6"><label class="form-label small">Prenom</label><input class="form-control" id="uPrenom"></div>
        <div class="col-12"><label class="form-label small">Email</label><input type="email" class="form-control" id="uEmail"></div>
        <div class="col-6"><label class="form-label small">Telephone</label><input class="form-control" id="uTelephone"></div>
        <div class="col-6"><label class="form-label small">Service</label><input class="form-control" id="uService"></div>
        <div class="col-6">
          <label class="form-label small">Role</label>
          <select class="form-select" id="uRole">
            <option value="super_admin">Super Administrateur</option>
            <option value="enrolement">Enrolement</option>
            <option value="production">Production</option>
            <option value="produit">Produit</option>
            <option value="quarantaine">Quarantaine</option>
            <option value="reception_plaintes">Reception et Plaintes</option>
          </select>
        </div>
        <div class="col-6"><label class="form-label small">Mot de passe</label><input type="password" class="form-control" id="uPassword" placeholder="Laisser vide si inchange"></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-success" onclick="enregistrerUser()">Enregistrer</button></div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/sidebar.js"></script>
<script>
const user = requireAuth(['super_admin']);
renderSidebar('utilisateurs.html');

async function chargerListe() {
  const users = await apiFetch('/users');
  document.getElementById('tableBody').innerHTML = users.map(u => `
    <tr>
      <td>${u.prenom} ${u.nom}</td><td>${u.email}</td><td>${u.service || '-'}</td>
      <td><span class="badge bg-secondary">${roleLabel(u.role)}</span></td>
      <td><span class="badge bg-${u.actif ? 'success' : 'danger'}">${u.actif ? 'Actif' : 'Inactif'}</span></td>
      <td>
        <button class="btn btn-sm btn-outline-primary" onclick='ouvrirModif(${JSON.stringify(u)})'><i class="bi bi-pencil"></i></button>
        <button class="btn btn-sm btn-outline-warning" onclick="toggleActif(${u.id})"><i class="bi bi-power"></i></button>
        <button class="btn btn-sm btn-outline-danger" onclick="supprimer(${u.id})"><i class="bi bi-trash"></i></button>
      </td>
    </tr>`).join('');
}

function ouvrirAjout() {
  document.getElementById('modalTitle').textContent = 'Nouvel utilisateur';
  ['uId','uNom','uPrenom','uEmail','uTelephone','uService','uPassword'].forEach(id => document.getElementById(id).value = '');
  new bootstrap.Modal(document.getElementById('modalUser')).show();
}

function ouvrirModif(u) {
  document.getElementById('modalTitle').textContent = 'Modifier utilisateur';
  document.getElementById('uId').value = u.id;
  document.getElementById('uNom').value = u.nom;
  document.getElementById('uPrenom').value = u.prenom;
  document.getElementById('uEmail').value = u.email;
  document.getElementById('uTelephone').value = u.telephone || '';
  document.getElementById('uService').value = u.service || '';
  document.getElementById('uRole').value = u.role;
  document.getElementById('uPassword').value = '';
  new bootstrap.Modal(document.getElementById('modalUser')).show();
}

async function enregistrerUser() {
  const id = document.getElementById('uId').value;
  const payload = {
    nom: document.getElementById('uNom').value,
    prenom: document.getElementById('uPrenom').value,
    email: document.getElementById('uEmail').value,
    telephone: document.getElementById('uTelephone').value,
    service: document.getElementById('uService').value,
    role: document.getElementById('uRole').value
  };
  const pwd = document.getElementById('uPassword').value;
  if (pwd) payload.password = pwd;
  try {
    if (id) {
      await apiFetch(`/users/${id}`, { method: 'PUT', body: JSON.stringify(payload) });
    } else {
      if (!pwd) return alert('Le mot de passe est requis pour un nouvel utilisateur.');
      await apiFetch('/users', { method: 'POST', body: JSON.stringify(payload) });
    }
    bootstrap.Modal.getInstance(document.getElementById('modalUser')).hide();
    chargerListe();
  } catch (err) { alert(err.message); }
}

async function toggleActif(id) { await apiFetch(`/users/${id}/toggle`, { method: 'PATCH' }); chargerListe(); }
async function supprimer(id) {
  if (!confirm('Confirmer la suppression de cet utilisateur ?')) return;
  await apiFetch(`/users/${id}`, { method: 'DELETE' });
  chargerListe();
}
chargerListe();
</script>
</body>
</html>
